<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

        <div>
            <h2 class="fw-bold mb-1 text-dark">
                <i class="bi bi-briefcase-fill text-primary me-2"></i>
                Nueva Vacante
            </h2>

            <p class="text-muted mb-0">
                Completa la información para registrar una nueva vacante.
            </p>
        </div>

        <button class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-2"></i>
            Volver
        </button>

    </div>

    <!-- FORM CARD -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

        <!-- CARD HEADER -->
        <div class="card-header bg-white border-0 py-4 px-4">

            <h5 class="fw-semibold mb-0 text-dark">
                Información de la Vacante
            </h5>

        </div>

        <!-- CARD BODY -->
        <div class="card-body p-4">

            <form>

                <div class="row g-4">

                    <!-- NOMBRE -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold text-dark">
                            Nombre de la Vacante
                        </label>

                        <div class="input-group">

                            <span class="input-group-text bg-light border-0">
                                <i class="bi bi-briefcase-fill text-primary"></i>
                            </span>

                            <input
                                type="text"
                                class="form-control border-0 bg-light py-3"
                                placeholder="Ingrese el nombre de la vacante"
                            >

                        </div>

                    </div>

                    <!-- SALARIO -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold text-dark">
                            Salario
                        </label>

                        <div class="input-group">

                            <span class="input-group-text bg-light border-0">
                                <i class="bi bi-cash-stack text-success"></i>
                            </span>

                            <input
                                type="number"
                                class="form-control border-0 bg-light py-3"
                                placeholder="Ingrese el salario"
                            >

                        </div>

                    </div>

                    <!-- FECHA -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold text-dark">
                            Fecha de Publicación
                        </label>

                        <input
                            type="date"
                            class="form-control border-0 bg-light py-3"
                        >

                    </div>

                    <!-- CATEGORÍA -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold text-dark">
                            Categoría
                        </label>

                        <select class="form-select border-0 bg-light py-3">

                            <option selected>
                                Seleccione una categoría
                            </option>

                            <option>
                                Computación / TI
                            </option>

                            <option>
                                Administración
                            </option>

                            <option>
                                Marketing
                            </option>

                        </select>

                    </div>

                    <!-- ESTATUS -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold text-dark">
                            Estado
                        </label>

                        <select class="form-select border-0 bg-light py-3">

                            <option selected>
                                Seleccione un estado
                            </option>

                            <option>
                                Aprobada
                            </option>

                            <option>
                                Pendiente
                            </option>

                            <option>
                                Cancelada
                            </option>

                        </select>

                    </div>

                    <!-- DESTACADO -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold text-dark">
                            Destacado
                        </label>

                        <select class="form-select border-0 bg-light py-3">

                            <option selected>
                                Seleccione una opción
                            </option>

                            <option>
                                Sí
                            </option>

                            <option>
                                No
                            </option>

                        </select>

                    </div>

                    <!-- IMAGEN -->
                    <div class="col-12">

                        <label class="form-label fw-semibold text-dark">
                            URL de Imagen
                        </label>

                        <div class="input-group">

                            <span class="input-group-text bg-light border-0">
                                <i class="bi bi-image-fill text-primary"></i>
                            </span>

                            <input
                                type="text"
                                class="form-control border-0 bg-light py-3"
                                placeholder="Ingrese la URL de la imagen"
                            >

                        </div>

                    </div>

                    <!-- DESCRIPCIÓN -->
                    <div class="col-12">

                        <label class="form-label fw-semibold text-dark">
                            Descripción
                        </label>

                        <textarea
                            class="form-control border-0 bg-light"
                            rows="4"
                            placeholder="Ingrese una descripción breve de la vacante"
                        ></textarea>

                    </div>

                    <!-- DETALLES -->
                    <div class="col-12">

                        <label class="form-label fw-semibold text-dark">
                            Detalles
                        </label>

                        <textarea
                            class="form-control border-0 bg-light"
                            rows="8"
                            placeholder="Ingrese los detalles completos de la vacante"
                        ></textarea>

                    </div>

                </div>

                <!-- ACTIONS -->
                <div class="d-flex justify-content-end gap-3 mt-5 flex-wrap">

                    <button
                        type="button"
                        class="btn btn-light border rounded-pill px-4 py-2"
                    >
                        Cancelar
                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary rounded-pill px-5 py-2 shadow-sm"
                    >
                        <i class="bi bi-check-circle me-2"></i>
                        Guardar Vacante
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
