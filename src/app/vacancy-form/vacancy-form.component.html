<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

        <div>
            <h2 class="fw-bold mb-1 text-dark">
                <i class="bi bi-briefcase-fill text-primary me-2"></i>
                {{ esEdicion ? 'Editar' : 'Crear' }} Vacante
            </h2>

            <p class="text-muted mb-0">
                Completa la información para {{ esEdicion ? 'actualizar' : 'registrar' }} una nueva vacante.
            </p>
        </div>

        <button class="btn btn-outline-secondary rounded-pill px-4" routerLink="/vacantes">
            <i class="bi bi-arrow-left me-2"></i>
            Volver
        </button>

    </div>

    <!-- FORM CARD -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

        <!-- CARD HEADER -->
        <div class="card-header bg-white border-0 py-4 px-4">

            <h5 class="fw-semibold mb-0 text-dark">
                Información de la Vacante
            </h5>

        </div>

        <!-- CARD BODY -->
        <div class="card-body p-4">

            @if(formGroup) {
                <form [formGroup]="formGroup" enctype="multipart/form-data" (ngSubmit)="save()">
                
                    <div class="row g-4">
                
                        <!-- NOMBRE -->
                        <div class="col-md-6">
                
                            <label class="form-label fw-semibold text-dark">
                                Nombre de la Vacante
                            </label>
                
                            <div class="input-group">
                
                                <span class="input-group-text bg-light border-0">
                                    <i class="bi bi-briefcase-fill text-primary"></i>
                                </span>
                
                                <input formControlName="nombre" id="nombre" type="text" class="form-control border-0 bg-light py-3"
                                    placeholder="Ingrese el nombre de la vacante">
                
                            </div>
                
                        </div>
                
                        <!-- SALARIO -->
                        <div class="col-md-6">
                
                            <label class="form-label fw-semibold text-dark">
                                Salario
                            </label>
                
                            <div class="input-group">
                
                                <span class="input-group-text bg-light border-0">
                                    <i class="bi bi-cash-stack text-success"></i>
                                </span>
                
                                <input type="number" class="form-control border-0 bg-light py-3" placeholder="Ingrese el salario" id="salario" formControlName="salario">
                
                            </div>
                
                        </div>
                
                        <!-- FECHA -->
                        <div class="col-md-6">
                
                            <label class="form-label fw-semibold text-dark">
                                Fecha de Publicación
                            </label>
                
                            <input id="fecha" formControlName="fecha" type="date" class="form-control border-0 bg-light py-3">
                
                        </div>
                
                        <!-- CATEGORÍA -->
                        <div formGroupName="categoria" class="col-md-6">
                            <label class="form-label fw-semibold text-dark">
                                Categoría
                            </label>
                            <select class="form-select border-0 bg-light py-3" formControlName="id">
                                <option value="">
                                    Seleccione una categoría
                                </option>
                                @for (category of categoriesList; track category.id) {
                                    <option [value]="category.id">
                                        {{category.nombre}}
                                    </option> 
                                }    
                            </select>
                        </div>
                
                        <!-- ESTATUS -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark">
                                Estado
                            </label>
                            <select class="form-select border-0 bg-light py-3" formControlName="estatus">
                                <option value="">
                                    Seleccione un estado
                                </option>
                                <option value="creada">
                                    Creada
                                </option>
                                <option value="aprobada">
                                    Aprobada
                                </option>
                                <option value="eliminada">
                                    Eliminada
                                </option>
                            </select>
                        </div>
                
                        <!-- RADIO BUTTON DESTACADO -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark d-block mb-3">
                                Destacado
                            </label>
                            <div class="d-flex gap-4">
                                <!-- DESTACADO -->
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" formControlName="destacado" id="destacado1" value="1" name="destacado">
                                    <label class="form-check-label" for="destacado1">
                                        Destacado
                                    </label>
                                </div>
                                <!-- NO DESTACADO -->
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" formControlName="destacado" id="destacado0" value="0" name="destacado">
                                    <label class="form-check-label" for="destacado0">
                                        No Destacado
                                    </label>
                                </div>
                            </div>
                        </div>
                
                        <!-- IMAGEN -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-dark">
                                Imagen
                            </label>
                            @if(imagenActual) {
                                <div class="mb-3">
                                    <img [src]="imagenActual" class="img-fluid mb-2 rounded shadow-sm" style="max-height: 200px;" />
                                </div>
                            }
                            <!-- <img [src]="imagenActual" class="img-fluid mb-2 rounded shadow-sm" style="max-height: 200px;" /> -->
                            <input type="file" class="form-control bg-light border-0 py-3" (change)="onFileSelected($event)">
                        </div>
                
                        <!-- DESCRIPCIÓN -->
                        <div class="col-12">
                            <label for="descripcion" class="form-label fw-semibold text-dark">
                                Descripción
                            </label>
                            <textarea id="descripcion" class="form-control border-0 bg-light" rows="4" formControlName="descripcion"
                                placeholder="Ingrese una descripción breve de la vacante">
                            </textarea>
                        </div>
                
                        <!-- DETALLES -->
                        <div class="col-12">
                            <label class="form-label fw-semibold text-dark">
                                Detalles
                            </label>
                            <textarea class="form-control border-0 bg-light" rows="8" formControlName="detalles"
                                placeholder="Ingrese los detalles completos de la vacante"></textarea>
                        </div>
                    </div>
                
                    <!-- ACTIONS -->
                    <div class="d-flex justify-content-end gap-3 mt-5 flex-wrap">
                
                        <button type="button" class="btn btn-light border rounded-pill px-4 py-2" routerLink="/vacantes">
                            Cancelar
                        </button>
                
                        <button type="submit" class="btn btn-primary rounded-pill px-5 py-2 shadow-sm">
                            <i class="bi bi-check-circle me-2"></i>
                            {{ esEdicion ? 'Actualizar' : 'Guardar' }} Vacante
                            <!-- @if(esEdicion){Actualizar Vacante}@else{Guardar Vacante} -->
                        </button>
                
                    </div>
                
                </form>
            }
            

        </div>

    </div>

</div>
